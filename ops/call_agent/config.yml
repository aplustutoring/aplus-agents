# ops/call_agent — Call Agent v1.1 configuration
# Secrets live in env vars (.env locally, repo secrets on Actions) — never here.

justcall:
  # JustCall numbers to poll for completed INBOUND calls. V1 scope: exactly one
  # number — the main A+ line. This is a list so more lines can be added later
  # without code changes, but before adding a number confirm its recording
  # disclosure is in place (see README — CA two-party consent).
  monitored_numbers:
    - "+18188506284"        # Main A+ line (IVR announces recording)
    - "+18188691627"        # Customer support line (recording disclosure confirmed by Roman 2026-07-20)

  # Consent guardrail: calls with no recording are never transcribed or
  # summarized — they are skipped and counted in the digest. Keep true.
  require_recording: true

  # Only calls of this type are processed (others are logged and ignored).
  # Live API values (lowercase, case-insensitive here):
  # answered | missed | voicemail | abandoned.
  process_call_types: ["answered"]

  # Hang-up filter: transcripts shorter than this are IVR fragments/hang-ups —
  # no Claude call, no HubSpot writes, just a count in the digest.
  # (3 of 7 answered calls in the 2026-07 test week were these.)
  min_transcript_chars: 200

  # Friendly names for the digest's daily-activity brief (account-wide stats
  # cover ALL lines, not just monitored_numbers). Unnamed lines display as
  # a formatted number.
  line_names:
    "+18188506284": "Main line"
    "+18188691627": "Support line"
    "+18185736644": "Sales line"   # outbound to leads + texting missed calls
    "+18185736293": "Roman's line"
    "+18185736258": "Recruitment & hiring"
    "+13235150123": "Sales line 2"
    "+18888697637": "Sales line 3 (888)"   # toll-free; barely published anywhere

  # JustCall interprets the from_datetime filter in the ACCOUNT timezone,
  # while response timestamps (call_date/call_time) are UTC (verified live
  # 2026-07-17). Must match the JustCall account setting.
  account_timezone: "America/Los_Angeles"

  # First-run lookback when no state cursor exists yet (days).
  initial_lookback_days: 1
  # Overlap window re-queried each run to survive crashes (idempotent via call IDs).
  overlap_minutes: 60
  # Recording-but-no-transcript calls younger than this are retried next run
  # (JustCall AI transcription lags the call by a few minutes); older ones are
  # counted as real "no transcript" skips. MUST stay below overlap_minutes or
  # a pending call can fall out of the re-fetch window before it's retried.
  transcript_grace_minutes: 45
  # Pause between per-call AI-transcript fetches (JustCall burst limit is
  # 30 req/min on the Team plan).
  ai_fetch_pause_seconds: 2

claude:
  # Repo-standard model (matches marketing/scripts/*).
  model: "claude-opus-4-7"
  max_tokens: 2000
  # Cost guard: transcripts longer than this are truncated before summarization
  # (truncation is noted in the summary metadata + digest line).
  max_transcript_chars: 50000

hubspot:
  # V1 never auto-creates contacts. Unmatched calls go to the digest for triage.
  auto_create_contacts: false

  # Owner IDs (HubSpot owner ids, not user ids) for task/ticket assignment.
  owners:
    roman: 38681249
    paola: 81494333
    janelle: 80047202
  # Action items whose owner_hint doesn't match anyone above default to:
  default_task_owner: paola
  # Follow-up tasks are due this many business days after the call.
  task_due_business_days: 1

  # Negative-sentiment / complaint check-in ticket (Support Pipeline).
  ticket:
    pipeline: "0"                 # Support Pipeline
    stage: "131537027"            # "Working on it"
    priority: "HIGH"
    owner: roman
    check_in_business_days: 2     # companion check-in task due date

slack:
  # Daily digest channel — used only with SLACK_BOT_TOKEN.
  # With SLACK_WEBHOOK_URL the webhook's own channel config wins.
  # #calls is PRIVATE — the bot must be invited (/invite in the channel).
  channel: "#calls"
  # Channel for immediate negative-sentiment/complaint alerts
  # (fires per call, not end-of-day). Leave empty to disable immediate
  # alerts (they still appear in the digest).
  alert_channel: "#calls"

coaching:
  # Rubric-based call scoring for coaching (see rubric.md — edit anchors
  # there, no code changes). Scores every processed call, attributed to the
  # team member who answered (JustCall agent_name). Coaching cards post to a
  # PRIVATE channel per call; with note_to_contact true (below) the full
  # evaluation is ALSO attached as a Note on the matched HubSpot contact.
  # Falls back to slack.alert_channel when channel is empty.
  enabled: true
  channel: "#calls"           # private; bot must be invited
  rubric_path: "ops/call_agent/rubric.md"
  # Also attach the full rubric evaluation as a Note on the matched HubSpot
  # contact. NOTE: contact Notes are visible to everyone with HubSpot access —
  # coaching scores become team-visible on family records. Flip to false to
  # keep coaching in the private Slack channel only.
  note_to_contact: true

state:
  # Repo-relative path; committed back by the workflow (topic-gen pattern).
  path: "ops/call_agent/state/state.json"
  # Cap on remembered processed call IDs (oldest dropped first).
  max_processed_ids: 5000
