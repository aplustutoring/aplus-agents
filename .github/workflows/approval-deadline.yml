name: Approval deadline check (DEPRECATED — approval gate removed)

# RETIRED 2026-06-08: the engine is now single-touchpoint. topic-gen auto-approves
# the slate on generation, so there is no pending slate to resolve at a Friday
# deadline. Kept manual-only as an escape hatch. approval_deadline.py stays usable.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip state write and DM)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    concurrency:
      group: aplus-state-write
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Resolve approval status
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ROMAN_SLACK_USER_ID: ${{ secrets.ROMAN_SLACK_USER_ID }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python3 marketing/scripts/b2b/approval_deadline.py $ARGS

      - name: Commit state changes
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add marketing/state/topic-queue.json marketing/state/history.json
          if git diff --cached --quiet; then
            echo "no state changes to commit"
          else
            git commit -m "approval-deadline: resolve slate for week"
            for attempt in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "state push attempt $attempt rejected; retrying..."
              sleep $((attempt * 3))
            done
          fi
