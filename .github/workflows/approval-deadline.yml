name: Approval deadline check (Friday 5 PM PT)

# Fri 17:00 PT — during PDT = 00:00 UTC Sat; during PST = 01:00 UTC Sat.
# No action by this deadline => auto-approve all 3 topics.
# Idempotent: terminal approval statuses (approved/auto_approved/denied) skip the API calls.
on:
  schedule:
    - cron: "0 0 * * 6"  # 17:00 PDT Friday
    - cron: "0 1 * * 6"  # 17:00 PST Friday
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip state write and DM)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    concurrency:
      group: aplus-state-write
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Resolve approval status
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          ROMAN_SLACK_USER_ID: ${{ secrets.ROMAN_SLACK_USER_ID }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python3 scripts/b2b/approval_deadline.py $ARGS

      - name: Commit state changes
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/topic-queue.json state/history.json
          if git diff --cached --quiet; then
            echo "no state changes to commit"
          else
            git commit -m "approval-deadline: resolve slate for week"
            git push
          fi
