name: Call agent — daily digest (~5:30 PM PT)

# Single fixed-UTC cron pinned to PDT (scorecard convention — winter runs ~1h
# earlier in PT, harmless for an end-of-day digest, avoids dual-cron double-runs).
#
# SAFETY DEFAULT: runs in --dry-run until the repo *variable* CALL_AGENT_LIVE
# is set to "true" (Settings -> Secrets and variables -> Actions -> Variables).
# Dry-run does real JustCall + Claude reads but prints instead of writing to
# HubSpot/Slack and does not persist state.
on:
  schedule:
    - cron: "30 0 * * *"   # 00:30 UTC = 17:30 PDT / 16:30 PST daily
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Force dry run (fetch + summarize, no HubSpot/Slack writes)"
        type: boolean
        default: true
      check_only:
        description: "Smoke test: confirm secrets wired, skip all reads/writes"
        type: boolean
        default: false
      since:
        description: "Optional manual cursor override (UTC ISO, e.g. 2026-07-09T00:00:00)"
        type: string
        default: ""

permissions:
  contents: write   # state file commit-back (topic-gen pattern)

jobs:
  run:
    runs-on: ubuntu-latest
    concurrency:
      group: call-agent-state-write
      cancel-in-progress: false
    defaults:
      run:
        working-directory: ops/call_agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run call agent
        env:
          JUSTCALL_API_KEY: ${{ secrets.JUSTCALL_API_KEY }}
          JUSTCALL_API_SECRET: ${{ secrets.JUSTCALL_API_SECRET }}
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          CHECK_ONLY: ${{ inputs.check_only && 'true' || '' }}
        run: |
          ARGS=""
          # Live only when explicitly opted in via repo variable AND the manual
          # dispatch didn't force dry-run. Scheduled runs use the variable alone.
          if [ "${{ vars.CALL_AGENT_LIVE }}" != "true" ] || [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "${{ inputs.since }}" ]; then
            ARGS="$ARGS --since ${{ inputs.since }}"
          fi
          python3 call_agent.py $ARGS
      - name: Commit state changes
        working-directory: .
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Dry-run/check-only runs write no state; --ignore-errors tolerates the
          # file not existing yet.
          git add --ignore-errors ops/call_agent/state/state.json || true
          if git diff --cached --quiet; then
            echo "no state changes to commit"
          else
            git commit -m "call-agent: persist state for $(date -u +%Y-%m-%d)"
            for attempt in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "state push attempt $attempt rejected; retrying..."
              sleep $((attempt * 3))
            done
          fi
