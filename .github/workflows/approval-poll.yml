name: Approval poll (DEPRECATED — approval gate removed)

# RETIRED 2026-06-08: the engine is now single-touchpoint. topic-gen auto-approves
# the slate on generation and content-build builds the drafts straight away; the
# human's only gate is publishing each finished HubSpot draft. There is no topic
# approval thread to poll. Kept as a manual-only escape hatch (REDO/PICK still work
# if someone dispatches it by hand). await-slack-approval.py stays as the library.
on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip state write)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  poll_approval:
    runs-on: ubuntu-latest
    concurrency:
      group: aplus-state-write
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Poll Slack approval thread
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          # REDO N regenerates candidates via a web-searched lens call.
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python3 scripts/b2b/await-slack-approval.py $ARGS

      - name: Commit state changes
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/topic-queue.json state/history.json
          if git diff --cached --quiet; then
            echo "no state changes to commit"
          else
            git commit -m "approval-poll: update slate approval state"
            for attempt in 1 2 3; do
              git pull --rebase --autostash origin main && git push && break
              echo "state push attempt $attempt rejected; retrying..."
              sleep $((attempt * 3))
            done
          fi
