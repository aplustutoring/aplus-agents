name: Approval poll (Thu 6 PM PT → Mon 7 AM PT)

on:
  schedule:
    - cron: "*/15 * * * 5"  # every 15 min UTC Friday (covers Thu evening PT)
    - cron: "*/15 * * * 6"  # every 15 min UTC Saturday (covers Fri PT)
    - cron: "*/15 * * * 0"  # every 15 min UTC Sunday (covers Sat PT)
    - cron: "*/15 0-14 * * 1"  # every 15 min UTC Mon 00:00-14:59 (covers Mon early PT)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (skip state write)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  poll_approval:
    runs-on: ubuntu-latest
    concurrency:
      group: aplus-state-write
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Poll Slack approval thread
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python3 scripts/b2b/await-slack-approval.py $ARGS

      - name: Commit state changes
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state/topic-queue.json state/history.json
          if git diff --cached --quiet; then
            echo "no state changes to commit"
          else
            git commit -m "approval-poll: update slate approval state"
            git push
          fi
