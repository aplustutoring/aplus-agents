# aplus_email_agent configuration. LOCKED routing table — June 9, 2026.
# Fill the `id` placeholders during SETUP.md (HubSpot owner IDs + Slack member IDs).

hubspot:
  portal_id: 6312752
  # Conversations inbox to poll = admin@wetutorathome.com ("Inbox").
  inbox_id: "565493"
  # Single free pipeline (id 0, "Support Pipeline") shared with human support tickets.
  # Stage mapping onto existing stages (works today):
  #   needs_approval → "Working on it"     (agent drop / review queue)
  #   handled        → "Waiting on Family" (agent flips here after a human replies)
  #   closed         → "Done"
  # RECOMMENDED upgrade: add a dedicated "Needs Approval" stage and set it below
  # (run smoke_test.py to get its id). Optional: route low-confidence/breached to "Stuck".
  ticket_pipeline_id: "0"
  ticket_stages:
    needs_approval: "1378066770"  # Needs Approval (agent's review queue)
    handled: "2"                  # Waiting on Family
    closed: "4"                   # Done
  # Optional per-category handled stage (tutor-facing → Waiting on Tutor). Empty = use
  # the single handled stage above for everything.
  handled_stage_tutor: "3"        # Waiting on Tutor
  tutor_facing_categories: [tutor_document, recruitment]
  # Optional: stage for low-confidence / unknown / escalated tickets. Empty = disabled.
  stuck_stage: "131537028"        # Stuck

# HubSpot ticket fields set on every ticket (all editable here, no code change).
ticket_fields:
  source: "EMAIL"                 # source_type (these all arrive via the inbox)
  priority_urgent_on_high_risk: true   # bump to URGENT when the classifier risk == high
  priority_map:                   # routing priority → hs_ticket_priority
    high: "HIGH"
    normal: "MEDIUM"
    low: "LOW"
  category_default: "GENERAL_INQUIRY"     # label: General
  # our category → hs_ticket_category INTERNAL value (reshaped options).
  category_map:
    reschedule: "reschedule"
    tutor_issue: "Tutor Issue"
    complaint: "complaint"
    payment_dispute: "billing_refund"
    new_po: "new_deal_po"
    tor_inquiry: "new_deal_po"
    school_partner: "new_deal_po"
    business_dev: "GENERAL_INQUIRY"
    scheduling: "GENERAL_INQUIRY"
    tutor_document: "Tutor Issue"
    recruitment: "GENERAL_INQUIRY"
    charter_newsletter: "GENERAL_INQUIRY"
    unknown: "GENERAL_INQUIRY"
  # cancellation's category depends on its TYPE (drives the cancellation-rate KPI).
  cancellation_category_map:
    one_time: "cancellation_onetime"
    pause: "pause"
    stop: "cancel_service"
    default: "cancellation_onetime"

slack:
  digest_channel: "C0B9SEU76MA"   # #email-agent (private; use ID so the bot can post)

# Daily end-of-day summary, DM'd at 6 PM PT every day.
daily_summary:
  recipient: roman        # staff key whose slack_user_id gets the DM
  also_channel: false     # set true to also post it in #email-agent

# CC a staffer on every owner notification (shows the owner's NAME). Empty = off.
notify:
  cc_owner_dms_to: roman

# Launch-monitoring: hourly rollup DM during business hours, auto-stops after `until`.
hourly_update:
  enabled: true
  recipient: roman
  until: "2026-06-24"        # 2 weeks; no-op after this date
  business_hours_only: true  # 9am-6pm PT, Mon-Fri only

# Also create a HubSpot Task (owner to-do with a due date + reminders) per routed
# email, on top of the ticket + Slack DM. Empty/false = off.
owner_task:
  enabled: true

# Tutor-document auto-receipt (the agent's ONLY outbound email). sender_actor_id is
# "A-{hubspot userId}" of the agent it sends as (Kath). Empty = disable the receipt.
doc_receipt:
  sender_actor_id: "A-59969437"   # Kath Hitosis

monday:
