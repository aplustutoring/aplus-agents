  # Create these two rows on the L10 Scorecard by hand, then paste item ids.
  measurables:
    sla_breaches_item_id: "12238741454"        # goal: 0 (L10 group: Emily — Company Metrics)
    median_response_hrs_item_id: "12238737226" # goal: < 8

google_sheets:
