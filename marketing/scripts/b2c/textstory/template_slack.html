<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  @font-face { font-family: "Fraunces"; src: url("__FRAUNCES_URL__") format("truetype"); font-weight: 600; }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; width: 1080px; height: 1920px; overflow: hidden; background: #FFFFFF;
    font-family: -apple-system, "Segoe UI", "Lato", Roboto, "Noto Sans", "DejaVu Sans", sans-serif;
  }
  /* channel header (Slack-style) */
  .header {
    position: absolute; top: 0; left: 0; right: 0; height: 150px; z-index: 5;
    background: #FFFFFF; border-bottom: 1px solid rgba(0,0,0,0.10);
    display: flex; align-items: center; padding: 0 44px;
  }
  .header .hash { color: #9b9b9b; font-weight: 600; font-size: 44px; margin-right: 10px; }
  .header .chan { color: #1d1c1d; font-weight: 600; font-size: 44px; }
  .header .members { margin-left: auto; color: #9b9b9b; font-size: 30px; }

  .viewport { position: absolute; top: 150px; bottom: 70px; left: 0; right: 0; overflow: hidden; }
  .thread { position: absolute; top: 0; left: 0; right: 0; will-change: transform; padding-top: 14px; }

  .post { display: flex; padding: 16px 40px 6px; opacity: 0; }
  .post .ava {
    width: 76px; height: 76px; border-radius: 14px; flex: none; margin-right: 22px;
    color: #fff; font-size: 30px; font-weight: 600; display: flex; align-items: center; justify-content: center;
  }
  .post .body { flex: 1; min-width: 0; }
  .post .meta { display: flex; align-items: baseline; gap: 14px; margin-bottom: 4px; }
  .post .who { color: #1d1c1d; font-weight: 600; font-size: 33px; }
  .post .ts { color: #9b9b9b; font-size: 24px; }
  .post .text { color: #1d1c1d; font-size: 35px; line-height: 1.4; white-space: pre-wrap; word-wrap: break-word; }
  .mention {
    background: #E8F3FC; color: #1264A3; font-weight: 600; border-radius: 6px; padding: 0 8px;
  }
  .mention.broadcast { background: #FBE9D0; color: #AF6B17; }

  .reacts { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 14px; }
  .react {
    display: inline-flex; align-items: center; gap: 9px; opacity: 0;
    background: #F3F6F9; border: 1px solid #D6E3EE; border-radius: 999px;
    padding: 7px 17px; font-size: 30px;
  }
  .react .n { color: #1264A3; font-weight: 600; font-size: 27px; }

  .endcard {
    position: absolute; inset: 0; z-index: 20; background: #1A3A52; opacity: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; padding: 0 100px;
  }
  .endcard img.logo { width: 200px; margin-bottom: 80px; }
  .endcard .line { font-family: "Fraunces", serif; font-weight: 600; color: #F8F4ED; font-size: 84px; line-height: 1.14; }
  .endcard .cta { margin-top: 80px; background: #EF5829; color: #F8F4ED; font-size: 42px; font-weight: 700; padding: 32px 64px; border-radius: 999px; }
  .endcard .url { margin-top: 28px; color: rgba(248,244,237,0.8); font-size: 28px; }
  .endcard .disclosure { position: absolute; bottom: 80px; left: 0; right: 0; color: rgba(248,244,237,0.72); font-size: 28px; }
</style>
</head>
<body>
  <div class="header">
    <span class="hash">#</span><span class="chan" id="chan">student-wins</span>
    <span class="members" id="members"></span>
  </div>
  <div class="viewport"><div class="thread" id="thread"></div></div>
  <div class="endcard" id="endcard"></div>

<script>
const DATA = __DATA__;
document.getElementById("chan").textContent = (DATA.header && DATA.header.channel) || "student-wins";
const thread = document.getElementById("thread");
const els = [];

const AVATAR_COLORS = ["#4A8FE7","#1FA36B","#E0A23B","#9B6FD4","#D86B57","#3FA6A0","#C45B86","#5B8A45"];
function colorFor(key){let h=0;for(const c of(key||"x"))h=(h*31+c.charCodeAt(0))>>>0;return AVATAR_COLORS[h%AVATAR_COLORS.length];}

function renderText(container, text){
  const re=/(@(?:channel|here|everyone|[A-Za-z][\w.'-]*))/g;
  let last=0,m;
  while((m=re.exec(text))!==null){
    if(m.index>last) container.appendChild(document.createTextNode(text.slice(last,m.index)));
    const span=document.createElement("span");
    const tok=m[1].slice(1).toLowerCase();
    span.className="mention"+((tok==="channel"||tok==="here"||tok==="everyone")?" broadcast":"");
    span.textContent=m[1];
    container.appendChild(span);
    last=m.index+m[1].length;
  }
  if(last<text.length) container.appendChild(document.createTextNode(text.slice(last)));
}

for(const item of DATA.items){
  const el=document.createElement("div");
  el.className="post";
  const ava=document.createElement("div");
  ava.className="ava"; ava.style.background=colorFor(item.sender_key||item.sender);
  ava.textContent=item.initials||"?";
  el.appendChild(ava);
  const body=document.createElement("div"); body.className="body";
  const meta=document.createElement("div"); meta.className="meta";
  const who=document.createElement("span"); who.className="who"; who.textContent=item.sender;
  const ts=document.createElement("span"); ts.className="ts"; ts.textContent=item.ts||"";
  meta.appendChild(who); meta.appendChild(ts); body.appendChild(meta);
  const txt=document.createElement("div"); txt.className="text"; renderText(txt,item.text||"");
  body.appendChild(txt);
  if(item.reactions&&item.reactions.length){
    const rr=document.createElement("div"); rr.className="reacts";
    for(const r of item.reactions){
      const chip=document.createElement("div"); chip.className="react";
      const e=document.createElement("span"); e.textContent=r.emoji||"👍";
      const n=document.createElement("span"); n.className="n"; n.textContent=r.count||1;
      chip.appendChild(e); chip.appendChild(n); rr.appendChild(chip);
    }
    body.appendChild(rr); el._reacts=rr;
  }
  el.appendChild(body);
  thread.appendChild(el); els.push(el);
}

const endcard=document.getElementById("endcard");
{
  const ec=DATA.endcard;
  if(ec.logo){const img=document.createElement("img");img.className="logo";img.src=ec.logo;endcard.appendChild(img);}
  const line=document.createElement("div");line.className="line";line.textContent=ec.line;endcard.appendChild(line);
  const cta=document.createElement("div");cta.className="cta";cta.textContent=ec.cta;endcard.appendChild(cta);
  const url=document.createElement("div");url.className="url";url.textContent=ec.url_display;endcard.appendChild(url);
  const disc=document.createElement("div");disc.className="disclosure";
  disc.textContent="Based on real A+ team moments";  /* baked in — never generated */
  endcard.appendChild(disc);
}

const VIEW_H=document.querySelector(".viewport").clientHeight;
const POP=0.4, PAN=0.5;
let offsets=[];
function measure(){offsets=els.map(el=>el.offsetTop+el.offsetHeight+14-VIEW_H);}
function easeOutCubic(p){return 1-Math.pow(1-p,3);}
function easeOutBack(p){const c1=1.3,c3=c1+1;return 1+c3*Math.pow(p-1,3)+c1*Math.pow(p-1,2);}
const clamp01=p=>Math.max(0,Math.min(1,p));

function cameraOffset(t){
  let cur=-VIEW_H,prev=-VIEW_H,at=-1;
  for(let i=0;i<DATA.items.length;i++){
    if(DATA.items[i].appear<=t){prev=cur;cur=offsets[i];at=DATA.items[i].appear;} else break;
  }
  if(at<0)return 0;
  return Math.max(0,prev+(cur-prev)*easeOutCubic(clamp01((t-at)/PAN)));
}

function seek(t){
  for(let i=0;i<DATA.items.length;i++){
    const item=DATA.items[i],el=els[i];
    if(t<item.appear){el.style.opacity=0;el.style.transform="none";if(el._reacts)el._reacts.style.opacity=0;continue;}
    const p=clamp01((t-item.appear)/POP);
    el.style.opacity=clamp01(p*2.2);
    el.style.transform=`translateY(${18*(1-easeOutCubic(p))}px)`;
    if(el._reacts){
      const rp=clamp01((t-(item.react_at||item.appear+0.9))/0.3);
      el._reacts.style.opacity=rp;
      const chips=el._reacts.querySelectorAll(".react");
      for(let j=0;j<chips.length;j++){
        const cp=clamp01((t-(item.react_at||item.appear+0.9)-j*0.12)/0.3);
        chips[j].style.opacity=cp;
        chips[j].style.transform=`scale(${0.6+0.4*easeOutBack(cp)})`;
      }
    }
  }
  thread.style.transform=`translateY(${-cameraOffset(t)}px)`;
  const ec=DATA.endcard;
  endcard.style.opacity=t>=ec.start?clamp01((t-ec.start)/0.6):0;
}
window.seek=seek; window.__ready=false;
document.fonts.ready.then(()=>{measure();seek(0);window.__ready=true;});
</script>
</body>
</html>
